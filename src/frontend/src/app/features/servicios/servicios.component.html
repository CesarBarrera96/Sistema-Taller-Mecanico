<div class="page-header">
  <h1>Servicios</h1>
  <button mat-raised-button color="primary" (click)="abrirDialogo()">
    <mat-icon>add</mat-icon> Nuevo Servicio
  </button>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="datos" class="full-width-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripcion</th>
        <td mat-cell *matCellDef="let row">{{ row.descripcion }}</td>
      </ng-container>
      <ng-container matColumnDef="precioManoObra">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let row">{{ row.precioManoObra | currency:'MXN':'symbol':'1.2-2' }}</td>
      </ng-container>
      <ng-container matColumnDef="activo">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let row">
          <mat-icon [color]="row.activo ? 'primary' : 'warn'">{{ row.activo ? 'check_circle' : 'cancel' }}</mat-icon>
        </td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="abrirDialogo(row)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(row.id)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div *ngIf="loading" class="loading">Cargando...</div>
    <div *ngIf="!loading && datos.length === 0" class="empty">No hay servicios registrados</div>
  </mat-card-content>
</mat-card>
