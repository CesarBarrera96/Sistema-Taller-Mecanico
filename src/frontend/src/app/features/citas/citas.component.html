<div class="page-header">
  <h1>Citas</h1>
  <div class="header-actions">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filtrar por fecha</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="filtroFecha" (dateChange)="filtrarFecha()">
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <button *ngIf="filtroFecha" mat-icon-button (click)="limpiarFiltro()" matTooltip="Limpiar filtro">
      <mat-icon>clear</mat-icon>
    </button>
    <button mat-raised-button color="primary" (click)="abrirDialogo()">
      <mat-icon>add</mat-icon> Nueva Cita
    </button>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="datos" class="full-width-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let row">{{ row.nombreCliente }}</td>
      </ng-container>
      <ng-container matColumnDef="vehiculo">
        <th mat-header-cell *matHeaderCellDef>Vehiculo</th>
        <td mat-cell *matCellDef="let row">{{ row.vehiculoDescripcion }}</td>
      </ng-container>
      <ng-container matColumnDef="fechaHora">
        <th mat-header-cell *matHeaderCellDef>Fecha/Hora</th>
        <td mat-cell *matCellDef="let row">{{ row.fechaHora | date:'short' }}</td>
      </ng-container>
      <ng-container matColumnDef="duracionMinutos">
        <th mat-header-cell *matHeaderCellDef>Duracion</th>
        <td mat-cell *matCellDef="let row">{{ row.duracionMinutos }} min</td>
      </ng-container>
      <ng-container matColumnDef="estatus">
        <th mat-header-cell *matHeaderCellDef>Estatus</th>
        <td mat-cell *matCellDef="let row">
          <mat-chip [color]="estatusColor(row.estatus)" highlighted>
            {{ row.estatus }}
          </mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="motivo">
        <th mat-header-cell *matHeaderCellDef>Motivo</th>
        <td mat-cell *matCellDef="let row">{{ row.motivo }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="abrirDialogo(row)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button *ngIf="row.estatus === 'Programada'" mat-icon-button color="accent"
                  (click)="cambiarEstatus(row, EstatusCitaS.Confirmada)" matTooltip="Confirmar">
            <mat-icon>check</mat-icon>
          </button>
          <button *ngIf="row.estatus === 'Confirmada' && !row.ordenTrabajoId" mat-icon-button color="primary"
                  (click)="convertirAOrden(row)" matTooltip="Convertir a Orden">
            <mat-icon>receipt_long</mat-icon>
          </button>
          <button *ngIf="row.estatus !== 'Cancelada' && row.estatus !== 'Completada'" mat-icon-button color="warn"
                  (click)="cambiarEstatus(row, EstatusCitaS.Cancelada)" matTooltip="Cancelar">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <div *ngIf="loading" class="loading">Cargando...</div>
    <div *ngIf="!loading && datos.length === 0" class="empty">No hay citas registradas</div>
  </mat-card-content>
</mat-card>
